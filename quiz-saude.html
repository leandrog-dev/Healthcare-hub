<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz de Saúde - HealthCare Hub</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<header>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">🏥 HealthCare Hub</a>

            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">🏠 Início</a></li>
                <li><a href="calculadora-imc.html" class="nav-link">📊 IMC</a></li>
                <li><a href="agendamento.html" class="nav-link">📅 Agendar</a></li>
                <li><a href="dicas-saude.html" class="nav-link">💡 Dicas</a></li>
                <li><a href="quiz-saude.html" class="nav-link active">❓ Quiz</a></li>
            </ul>
        </div>
    </nav>
</header>

<!-- ================= QUIZ ================= -->
<main class="quiz-container">

    <!-- PROGRESSO -->
    <div class="quiz-progress">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <span id="progressText">Pergunta 1</span>
    </div>

    <!-- QUIZ -->
    <div id="quizContent">

        <div class="quiz-pergunta">
            <h2 id="perguntaTexto">Carregando...</h2>
        </div>

        <div class="quiz-opcoes" id="opcoesContainer">
            
        </div>

        <div style="margin-top: 20px; text-align: center;">
            <button id="btnProxima" class="btn btn-primary">
                Próxima ➡️
            </button>
        </div>

    </div>

    <!-- RESULTADO -->
    <div id="quizFinal" class="hidden">
        <h2 id="resultadoFinal"></h2>
        <p id="pontuacaoTexto"></p>

        <div id="acertosLista"></div>

        <div style="margin-top:20px;">
            <button onclick="reiniciarQuiz()" class="btn btn-primary">
                Refazer Quiz
            </button>

            <button onclick="window.location.href='index.html'" class="btn btn-secondary">
                Voltar ao Início
            </button>
        </div>
    </div>

</main>

<!-- ================= FOOTER ================= -->
<footer>
    <div class="footer-content">
        <p>&copy; 2026 HealthCare Hub. Desenvolvido por: Leandro Gabriel</p>
    </div>
</footer>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
