<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - HealthCare Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <a href="index.html" class="logo">🏥 HealthCare Hub</a>
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">🏠 Início</a></li>
                    <li><a href="calculadora-imc.html" class="nav-link">📊 IMC</a></li>
                    <li><a href="agendamento.html" class="nav-link active">📅 Agendar</a></li>
                    <li><a href="dicas-saude.html" class="nav-link">💡 Dicas</a></li>
                    <li><a href="quiz-saude.html" class="nav-link">❓ Quiz</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="agendamento-container">
        <div class="agendamento-form">
            <h1>Agende sua Consulta</h1>
            
            <form id="agendamentoForm">
                <div class="form-row">
                    <div class="input-group">
                        <label>Nome Completo</label>
                        <input type="text" id="nome" required>
                    </div>
                    <div class="input-group">
                        <label>Telefone</label>
                        <input type="tel" id="telefone" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="input-group">
                        <label>Data</label>
                        <input type="date" id="data" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Especialidade</label>
                    <select id="especialidade" required>
                        <option value="">Selecione...</option>
                        <option value="cardiologia">❤️ Cardiologia</option>
                        <option value="dermatologia">✨ Dermatologia</option>
                        <option value="ortopedia">🦴 Ortopedia</option>
                        <option value="pediatria">👶 Pediatria</option>
                        <option value="nutricao">🥗 Nutrição</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Horário</label>
                    <div class="horarios-grid" id="horarios">
                        <label><input type="radio" name="horario" value="08:00"> 08:00</label>
                        <label><input type="radio" name="horario" value="10:00"> 10:00</label>
                        <label><input type="radio" name="horario" value="14:00"> 14:00</label>
                        <label><input type="radio" name="horario" value="16:00"> 16:00</label>
                    </div>
                </div>

                <div class="input-group">
                    <label>Motivo da Consulta</label>
                    <textarea id="motivo" rows="4" required></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-large">Confirmar Agendamento</button>
            </form>

            <div id="confirmacao" class="confirmacao hidden">
                <div class="check-icon">✅</div>
                <h2>Agendamento Confirmado!</h2>
                <div id="detalhesAgendamento"></div>
                <button onclick="window.location.href='index.html'" class="btn btn-secondary">Voltar ao Início</button>
            </div>
        </div>

        <div class="proximas-consultas">
            <h3>Próximas Consultas</h3>
            <div id="listaConsultas" class="consultas-lista"></div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 HealthCare Hub. Desenvolvido por: Leandro Gabriel</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
