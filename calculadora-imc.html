<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IMC - HealthCare Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <a href="index.html" class="logo">🏥 HealthCare Hub</a>
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">🏠 Início</a></li>
                    <li><a href="calculadora-imc.html" class="nav-link active">📊 IMC</a></li>
                    <li><a href="agendamento.html" class="nav-link">📅 Agendar</a></li>
                    <li><a href="dicas-saude.html" class="nav-link">💡 Dicas</a></li>
                    <li><a href="quiz-saude.html" class="nav-link">❓ Quiz</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="imc-container">
        <div class="imc-calculator">
            <h1>Calculadora de IMC</h1>
            <p>Descubra seu Índice de Massa Corporal</p>
            
            <form id="imcForm" class="imc-form">
                <div class="input-group">
                    <label>Peso (kg)</label>
                    <input type="number" id="peso" step="0.1" min="20" max="300" required>
                </div>
                <div class="input-group">
                    <label>Altura (cm)</label>
                    <input type="number" id="altura" step="0.1" min="100" max="250" required>
                </div>
                <button type="submit" class="btn btn-primary btn-large">Calcular IMC</button>
            </form>

            <div id="resultadoIMC" class="resultado hidden">
                <div class="resultado-header">
                    <span id="imcValor"></span>
                    <span class="imc-status" id="imcStatus"></span>
                </div>
                <div class="resultado-info">
                    <p id="imcClassificacao"></p>
                    <div class="imc-progress">
                        <div id="imcBarra" class="imc-progress-bar"></div>
                    </div>
                </div>
                <div class="recomendacoes" id="recomendacoes"></div>
            </div>

            <div class="imc-tabela">
                <h3>Classificação IMC</h3>
                <div class="tabela-grid">
                    <div class="tabela-item magreza"><span>Magreza</span><span>&lt; 18.5</span></div>
                    <div class="tabela-item normal"><span>Normal</span><span>18.5-24.9</span></div>
                    <div class="tabela-item sobrepeso"><span>Sobrepeso</span><span>25-29.9</span></div>
                    <div class="tabela-item obesidade"><span>Obesidade</span><span>30-39.9</span></div>
                    <div class="tabela-item obeso"><span>Obesidade Grave</span><span>≥ 40</span></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 HealthCare Hub. Desenvolvido por: Leandro Gabriel</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
